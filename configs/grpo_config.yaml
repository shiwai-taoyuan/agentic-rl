model:
  model_path: "./output/sft/final"
  torch_dtype: bfloat16

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

grpo:
  learning_rate: 5.0e-6
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  max_completion_length: 2048
  num_generations: 8
  epsilon: 0.2
  beta: 0.04
  max_prompt_length: 1024
  logging_steps: 10
  save_steps: 100
  max_steps: 500
  output_dir: "./output/grpo"
  save_total_limit: 2
  temperature: 1.0

data:
  train_file: "data/train.json"

reward:
  # Weight overrides (merged with defaults). Comment out for defaults.
  # weights:
  #   format: 0.10
  #   tool_selection: 0.15
  #   parameter: 0.15
  #   step_order: 0.15
  #   dependency_usage: 0.15
  #   step_efficiency: 0.10
  #   reasoning_depth: 0.10
  #   outcome_alignment: 0.10

  # LLM judge for reasoning_depth and outcome_alignment.
  llm_judge:
    backend: "none"          # "none" | "api"
    model: ""                # model name/path
    api_url: ""              # OpenAI-compatible endpoint
